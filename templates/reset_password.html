<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #10a37f 0%, #0e8c6d 100%);
            --bg-animate: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: var(--bg-animate); background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; overflow: hidden;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }
        .auth-container {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            border-radius: 24px; padding: 3rem; width: 100%; max-width: 420px; text-align: center;
        }
        .logo-icon { font-size: 3rem; color: #10a37f; margin-bottom: 1rem; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e5e7eb; margin-bottom: 1rem; box-sizing: border-box; }
        .btn-main { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            background: var(--primary-grad); color: white; font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
    <h2>Mật khẩu mới</h2>
    <p>Đặt lại mật khẩu cho tài khoản: <br><strong>{{ email }}</strong></p>

    <form method="POST">
        <input type="password" name="password" placeholder="Mật khẩu mới" required>
        <input type="password" name="confirm_password" placeholder="Xác nhận mật khẩu mới" required>
        <button type="submit" class="btn-main">Cập nhật mật khẩu</button>
    </form>
</div>

</body>
</html>
