<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent - Đăng nhập hệ thống</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #10a37f 0%, #0e8c6d 100%);
            --bg-animate: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-animate);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- CSS CHO PROFILE Ở GÓC (MỚI THÊM) --- */
        .user-profile-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .user-trigger {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 50px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: 0.3s;
        }

        .user-trigger:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .avatar-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #fff;
            margin-left: 10px;
            object-fit: cover;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 55px;
            background: white;
            min-width: 220px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-content a {
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            color: #374151;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .dropdown-content a:hover { background: #f3f4f6; }

        /* --- PHẦN CŨ CỦA HÙNG --- */
        .auth-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo-icon {
            font-size: 3rem;
            background: var(--primary-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        h2 { font-weight: 800; margin: 0; color: #1f2937; }
        p { color: #6b7280; font-size: 0.9rem; margin-top: 0.5rem; }

        .tabs {
            display: flex;
            background: #f3f4f6;
            padding: 5px;
            border-radius: 12px;
            margin: 2rem 0;
        }

        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            color: #6b7280;
            transition: 0.3s;
        }

        .tab.active {
            background: white;
            color: #10a37f;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 1.2rem; position: relative; }
        
        input {
            width: 100%;
            padding: 14px 15px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            background: #fff;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #10a37f;
            box-shadow: 0 0 0 4px rgba(16, 163, 127, 0.1);
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--primary-grad);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(16, 163, 127, 0.2);
        }

        .btn-main:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #374151;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-google:hover { background: #f9fafb; }
        .hidden { display: none; }
    </style>
</head>
<body>

{% if session['user_id'] %}
<div class="user-profile-container">
    <div class="user-trigger" onclick="toggleDropdown()">
        <span style="color: white; font-weight: 600;">{{ session['username'] }}</span>
        <img src="{{ session['avatar'] if session['avatar'] else 'https://ui-avatars.com/api/?name=' + session['username'] }}" alt="Avatar" class="avatar-circle">
    </div>
    <div id="userDropdown" class="dropdown-content">
        <div style="padding: 15px; background: #f9fafb;">
            <p style="margin:0; font-weight:800; color:#1f2937;">{{ session['username'] }}</p>
            <p style="margin:0; font-size:11px; color:#6b7280;">{{ session['email'] }}</p>
        </div>
        <hr style="margin:0; border:0; border-top: 1px solid #eee;">
        <a href="{{ url_for('ai.dashboard') }}"><i class="fas fa-rocket" style="margin-right:10px; color:#10a37f;"></i> Vào Dashboard</a>
        <a href="{{ url_for('auth.logout') }}" style="color:#e11d48;"><i class="fas fa-power-off" style="margin-right:10px;"></i> Đăng xuất</a>
    </div>
</div>
{% endif %}

<div class="auth-container">
    <div class="logo-icon"><i class="fas fa-brain"></i></div>
    <h2>AI Agent Web</h2>
    <p>Hệ thống phân tích dữ liệu thông minh</p>

    <div class="tabs">
        <div class="tab active" id="login-tab" onclick="switchTab('login')">Đăng nhập</div>
        <div class="tab" id="register-tab" onclick="switchTab('register')">Đăng ký</div>
    </div>

    <div id="login-form">
        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <input type="email" name="email" placeholder="Email của bạn" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Mật khẩu" required>
            </div>
            <button type="submit" class="btn-main">Đăng nhập ngay</button>
        </form>
    </div>

    <div id="register-form" class="hidden">
        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="form-group">
                <input type="text" name="username" placeholder="Họ và tên" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Mật khẩu mới" required>
            </div>
            <button type="submit" class="btn-main" style="background: #2563eb;">Tạo tài khoản</button>
        </form>
    </div>

    <div style="text-align:center; margin: 1.5rem 0; color: #9ca3af; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Hoặc</div>
    
    <a href="{{ url_for('auth.google_login') }}" class="btn-google">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" style="width: 20px;">
        Tiếp tục với Google
    </a>
</div>

<script>
    function switchTab(type) {
        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        if (type === 'login') {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
        } else {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        }
    }

    // JS CHO DROPDOWN PROFILE
    function toggleDropdown() {
        const dropdown = document.getElementById('userDropdown');
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    }

    window.onclick = function(event) {
        if (!event.target.closest('.user-profile-container')) {
            const dropdown = document.getElementById('userDropdown');
            if (dropdown) dropdown.style.display = 'none';
        }
    }
</script>

</body>
</html>
