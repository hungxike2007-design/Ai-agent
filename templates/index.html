<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent — Đăng nhập hệ thống</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #6366f1;
            --green-dark: #4f46e5;
            --green-glow: rgba(99, 102, 241, 0.3);
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.75);
            --border: rgba(255, 255, 255, 0.6);
            --text: #0f172a;
            --muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: #818cf8;
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #38bdf8;
            bottom: -100px;
            right: -100px;
            animation-delay: 3s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: #c084fc;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 6s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        /* Card */
        .auth-card {
            position: relative;
            z-index: 10;
            background: var(--surface);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 3rem 2.8rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            animation: authFloat 6s ease-in-out infinite, slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes authFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .auth-card:hover {
            box-shadow: 0 25px 60px rgba(99, 102, 241, 0.15);
            border-color: rgba(255, 255, 255, 0.8);
            filter: brightness(1.02);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--green) 0%, #0d8a6b 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            margin: 0 auto 1rem;
            box-shadow: 0 10px 30px var(--green-glow);
        }

        .brand h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.03em;
        }

        .brand p {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 0.3rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 18px;
            padding: 6px;
            margin-bottom: 2rem;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--muted);
            transition: all 0.25s ease;
        }

        .tab.active {
            background: var(--green);
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* Form */
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 1.2rem;
        }

        .input-wrap i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.95rem;
        }

        .input-wrap input {
            width: 100%;
            padding: 15px 18px 15px 48px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 16px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        .input-wrap input::placeholder {
            color: #94a3b8;
        }

        .input-wrap input:focus {
            outline: none;
            border-color: var(--green);
            background: #ffffff;
            box-shadow: 0 0 0 4px var(--green-glow);
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: var(--green);
            text-decoration: none;
            margin-top: -0.7rem;
            margin-bottom: 1.2rem;
            font-weight: 600;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 8px 25px var(--green-glow);
            letter-spacing: 0.02em;
        }

        .btn-main:hover {
            transform: translateY(-4px);
            filter: brightness(1.05);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.3);
        }

        .btn-main:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 1.5rem 0;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            transition: all 0.25s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .btn-google:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="auth-card">
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-brain"></i></div>
            <h1>AI Agent Analytics</h1>
            <p>Hệ thống phân tích dữ liệu thông minh</p>
        </div>

        <div class="tabs">
            <div class="tab active" id="login-tab" onclick="switchTab('login')">Đăng nhập</div>
            <div class="tab" id="register-tab" onclick="switchTab('register')">Đăng ký</div>
        </div>

        <!-- Login Form -->
        <div id="login-form">
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="Email của bạn" required>
                </div>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Mật khẩu" required>
                </div>
                <a href="{{ url_for('auth.forgot_password') }}" class="forgot-link">Quên mật khẩu?</a>
                <button type="submit" class="btn-main"><i class="fas fa-sign-in-alt"></i> Đăng nhập ngay</button>
            </form>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="hidden">
            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Họ và tên" required>
                </div>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="Email" required>
                </div>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Mật khẩu mới" required>
                </div>
                <button type="submit" class="btn-main"
                    style="background: linear-gradient(135deg,#6366f1,#4f46e5); box-shadow: 0 8px 25px rgba(99,102,241,0.3);">
                    <i class="fas fa-user-plus"></i> Tạo tài khoản
                </button>
            </form>
        </div>

        <div class="divider">Hoặc</div>

        <a href="{{ url_for('auth.google_login') }}" class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google"
                style="width:20px;">
            Tiếp tục với Google
        </a>
    </div>

    <script>
        function switchTab(type) {
            const isLogin = type === 'login';
            document.getElementById('login-tab').classList.toggle('active', isLogin);
            document.getElementById('register-tab').classList.toggle('active', !isLogin);
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('register-form').classList.toggle('hidden', isLogin);
        }
    </script>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            {% for category, message in messages %}
            Swal.fire({
                icon: '{{ "success" if category == "success" else "error" if category == "danger" else "info" }}',
                title: '{{ "Thành công!" if category == "success" else "Lỗi!" if category == "danger" else "Thông báo" }}',
                text: '{{ message }}',
                confirmButtonColor: '#059669',
                background: '#ffffff',
                color: '#0f172a',
                borderRadius: '16px'
            });
            {% endfor %}
        });
    </script>
    {% endif %}
    {% endwith %}
</body>

</html>
