<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu — AI Agent Analytics</title>
    <meta name="description" content="Khôi phục quyền truy cập vào hệ thống AI Agent Analytics">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand: oklch(52% 0.17 168);
            --brand-dark: oklch(42% 0.16 168);
            --brand-glow: oklch(52% 0.17 168 / 0.25);
            --bg: oklch(97% 0.006 168);
            --surface: oklch(100% 0.004 168 / 0.85);
            --border: oklch(100% 0.004 168 / 0.65);
            --border-subtle: oklch(88% 0.008 168);
            --text: oklch(14% 0.008 168);
            --muted: oklch(50% 0.012 168);
            --subtle: oklch(68% 0.010 168);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Circuit grid background ── */
        #circuit-canvas {
            position: fixed;
            inset: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        /* ── Ambient orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
        }
        .orb-1 { width: 520px; height: 520px; background: oklch(72% 0.14 168 / 0.18); top: -180px; left: -150px; animation: d1 18s ease-in-out infinite; }
        .orb-2 { width: 380px; height: 380px; background: oklch(62% 0.12 200 / 0.14); bottom: -100px; right: -100px; animation: d2 22s ease-in-out infinite; }
        @keyframes d1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(28px,-36px); } }
        @keyframes d2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-20px,30px); } }

        /* ── Auth card ── */
        .auth-card {
            position: relative; z-index: 10;
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 3rem 2.8rem;
            width: 100%; max-width: 440px;
            box-shadow: 0 1px 2px oklch(14% 0.008 168 / 0.04),
                        0 8px 32px oklch(14% 0.008 168 / 0.08),
                        0 40px 80px oklch(14% 0.008 168 / 0.06);
            text-align: center;
            animation: cardIn 0.55s var(--ease-out-expo) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Icon ── */
        .icon-ring {
            position: relative;
            width: 72px; height: 72px;
            margin: 0 auto 1.5rem;
        }
        .icon-ring::before {
            content: '';
            position: absolute; inset: -6px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--brand);
            border-right-color: oklch(72% 0.14 168 / 0.3);
            animation: spin 3s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .icon-inner {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: #fff;
            box-shadow: 0 8px 24px var(--brand-glow);
        }

        h1 {
            font-size: 1.6rem; font-weight: 800;
            color: var(--text); letter-spacing: -0.03em;
            line-height: 1.2; margin-bottom: 0.5rem;
        }
        .sub {
            color: var(--muted); font-size: 0.9rem;
            font-weight: 500; margin-bottom: 2rem; line-height: 1.6;
        }

        /* ── Flash ── */
        .flash {
            padding: 12px 16px; border-radius: 12px;
            margin-bottom: 1rem; font-size: 0.875rem;
            font-weight: 600; display: flex;
            align-items: center; gap: 8px;
            text-align: left;
        }
        .flash.success { background: oklch(97% 0.04 155); border: 1px solid oklch(80% 0.10 155); color: oklch(35% 0.12 155); }
        .flash.danger  { background: oklch(97% 0.03 25);  border: 1px solid oklch(80% 0.10 25);  color: oklch(40% 0.14 25); }
        .flash.info    { background: oklch(97% 0.03 250); border: 1px solid oklch(80% 0.08 250); color: oklch(40% 0.12 250); }

        /* ── Input ── */
        .input-wrap { position: relative; margin-bottom: 1.2rem; text-align: left; }
        .input-wrap .input-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--subtle); font-size: 0.875rem;
            pointer-events: none;
        }
        .input-wrap input {
            width: 100%; padding: 13px 16px 13px 42px;
            background: oklch(100% 0.003 168 / 0.75);
            border: 1px solid var(--border-subtle);
            border-radius: 12px; color: var(--text);
            font-size: 0.9375rem; font-family: inherit;
            font-weight: 500; transition: all 0.2s var(--ease-out-quart);
        }
        .input-wrap input::placeholder { color: var(--subtle); font-weight: 400; }
        .input-wrap input:focus {
            outline: none; border-color: var(--brand);
            background: oklch(100% 0.004 168);
            box-shadow: 0 0 0 3px var(--brand-glow);
        }

        /* ── Buttons ── */
        .btn-main {
            width: 100%; padding: 13px; border: none;
            border-radius: 12px; background: var(--brand);
            color: #fff; font-size: 0.9375rem; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: all 0.2s var(--ease-out-quart);
            box-shadow: 0 4px 16px var(--brand-glow);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-main:hover { background: var(--brand-dark); transform: translateY(-2px); box-shadow: 0 8px 24px var(--brand-glow); }
        .btn-main:active { transform: translateY(0); }

        .back-link {
            display: inline-flex; align-items: center;
            gap: 6px; margin-top: 1.5rem;
            color: var(--muted); font-size: 0.875rem;
            font-weight: 600; text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--brand); }
    </style>
</head>

<body>
    <canvas id="circuit-canvas"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="auth-card">
        <div class="icon-ring">
            <div class="icon-inner"><i class="fas fa-key"></i></div>
        </div>
        <h1>Quên mật khẩu?</h1>
        <p class="sub">Nhập email đã đăng ký, chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu cho bạn.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for cat, msg in messages %}
        <div class="flash {{ cat }}">
            <i class="fas fa-{% if cat == 'success' %}check-circle{% elif cat == 'danger' %}exclamation-circle{% else %}info-circle{% endif %}"></i>
            {{ msg }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.forgot_password') }}" method="POST">
            <div class="input-wrap">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" name="email" placeholder="Email đã đăng ký" required autocomplete="email">
            </div>
            <button type="submit" class="btn-main">
                <i class="fas fa-paper-plane"></i> Gửi yêu cầu
            </button>
        </form>

        <a href="{{ url_for('auth.index') }}" class="back-link">
            <i class="fas fa-arrow-left"></i> Quay lại đăng nhập
        </a>
    </div>

    <script>
        // ── Circuit / data-stream background ──
        (function () {
            const canvas = document.getElementById('circuit-canvas');
            const ctx = canvas.getContext('2d');
            let W, H;
            const streams = [];
            const N = 30;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }

            function initStreams() {
                streams.length = 0;
                for (let i = 0; i < N; i++) {
                    streams.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        len: Math.random() * 80 + 40,
                        speed: Math.random() * 0.6 + 0.2,
                        alpha: Math.random() * 0.12 + 0.04,
                        hue: 168 + (Math.random() - 0.5) * 30,
                        angle: Math.random() * Math.PI * 2,
                    });
                }
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                streams.forEach(s => {
                    const dx = Math.cos(s.angle) * s.speed;
                    const dy = Math.sin(s.angle) * s.speed;
                    s.x += dx; s.y += dy;
                    if (s.x < -s.len || s.x > W + s.len || s.y < -s.len || s.y > H + s.len) {
                        s.x = Math.random() * W;
                        s.y = Math.random() * H;
                    }

                    const grad = ctx.createLinearGradient(
                        s.x, s.y,
                        s.x - Math.cos(s.angle) * s.len,
                        s.y - Math.sin(s.angle) * s.len
                    );
                    grad.addColorStop(0, `oklch(58% 0.14 ${s.hue} / ${s.alpha})`);
                    grad.addColorStop(1, `oklch(58% 0.14 ${s.hue} / 0)`);

                    ctx.beginPath();
                    ctx.moveTo(s.x, s.y);
                    ctx.lineTo(s.x - Math.cos(s.angle) * s.len, s.y - Math.sin(s.angle) * s.len);
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                });
                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', () => { resize(); initStreams(); });
            resize(); initStreams(); draw();
        })();
    </script>
</body>

</html>
