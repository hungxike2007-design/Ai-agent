<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu — AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #6366f1;
            --green-d: #4f46e5;
            --green-glow: rgba(99, 102, 241, 0.3);
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.75);
            --border: rgba(255, 255, 255, 0.6);
            --text: #0f172a;
            --muted: #64748b;
            --blur: blur(15px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: #818cf8;
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #38bdf8;
            bottom: -100px;
            right: -100px;
            animation-delay: 3s;
        }

        .card {
            position: relative;
            z-index: 10;
            background: var(--surface);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 3rem 2.8rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            text-align: center;
            animation: float 6s ease-in-out infinite, slideUp .5s ease;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .card:hover {
            box-shadow: 0 25px 60px rgba(99, 102, 241, 0.15);
            border-color: rgba(255, 255, 255, 0.8);
            filter: brightness(1.02);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-wrap {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--green), var(--green-d));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            color: white;
            margin: 0 auto 1.2rem;
            box-shadow: 0 10px 30px var(--green-glow);
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
        }

        p.sub {
            color: var(--muted);
            font-size: .85rem;
            margin-top: .4rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .flash {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: .85rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            font-weight: 600;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .input-wrap i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: .9rem;
        }

        .input-wrap input {
            width: 100%;
            padding: 13px 16px 13px 44px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            color: var(--text);
            font-size: .92rem;
            font-family: inherit;
            transition: .2s;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        .input-wrap input::placeholder {
            color: #94a3b8;
        }

        .input-wrap input:focus {
            outline: none;
            border-color: var(--green);
            background: #ffffff;
            box-shadow: 0 0 0 4px var(--green-glow);
        }

        .btn-main {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--green), var(--green-d));
            color: white;
            font-size: .95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 8px 25px var(--green-glow);
            transition: .25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(5, 150, 105, 0.3);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 1.4rem;
            color: #e2e8f0;
            font-size: .85rem;
            font-weight: 600;
            text-decoration: none;
            transition: .2s;
        }

        .back-link:hover {
            color: var(--green);
        }
    </style>
</head>

<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="card">
        <div class="icon-wrap"><i class="fas fa-key"></i></div>
        <h2>Quên mật khẩu?</h2>
        <p class="sub">Nhập email đã đăng ký, chúng tôi sẽ giúp bạn đặt lại mật khẩu.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for cat, msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.forgot_password') }}" method="POST">
            <div class="input-wrap">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" placeholder="Email đã đăng ký" required>
            </div>
            <button type="submit" class="btn-main"><i class="fas fa-paper-plane"></i> Gửi yêu cầu</button>
        </form>
        <a href="{{ url_for('auth.index') }}" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
    </div>
</body>

</html>
