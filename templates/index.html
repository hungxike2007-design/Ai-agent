<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập & Đăng ký</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page"> <div class="card">
    <h2 style="text-align: center; color: var(--primary);">🚀 Ai Agent</h2>
    <p style="text-align: center; color: #666; font-size: 14px;">Hệ thống phân tích dữ liệu AI</p>
    
    <div class="tabs">
        <div class="tab active" id="login-tab" onclick="switchTab('login')">Đăng nhập</div>
        <div class="tab" id="register-tab" onclick="switchTab('register')">Đăng ký</div>
    </div>

    <div id="login-form">
        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <input type="email" name="email" placeholder="Email của bạn" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Mật khẩu" required>
            </div>
            <button type="submit" class="btn-main">Đăng nhập ngay</button>
        </form>
    </div>

    <div id="register-form" class="hidden">
        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="form-group">
                <input type="text" name="username" placeholder="Họ và tên" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Mật khẩu mới" required>
            </div>
            <button type="submit" class="btn-main" style="background: #007bff;">Tạo tài khoản</button>
        </form>
    </div>

    <div style="text-align:center; margin: 15px 0; color: #888; font-size: 14px;">Hoặc</div>
    
    <button class="btn-google" onclick="alert('Tính năng đang phát triển.')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
        Tiếp tục với Google
    </button>
</div>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>

</body>
</html>
