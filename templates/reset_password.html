<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu — AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--green:#4f46e5;--bg:#f8fafc;--border:#e2e8f0;--text:#0f172a;--muted:#64748b}
        body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
        .blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.15;pointer-events:none}
        .b1{width:400px;height:400px;background:#6366f1;top:-120px;right:-120px}
        .b2{width:350px;height:350px;background:#10b981;bottom:-100px;left:-100px}
        .card{position:relative;z-index:10;background:rgba(255,255,255,.9);backdrop-filter:blur(24px);border:1px solid #ffffff;border-radius:28px;padding:2.8rem 2.5rem;width:100%;max-width:420px;box-shadow:0 20px 40px rgba(0,0,0,.08);text-align:center}
        .icon{width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;color:#fff;margin:0 auto 1.2rem;box-shadow:0 10px 30px rgba(99,102,241,.3)}
        h2{font-size:1.4rem;font-weight:800;color:var(--text)}
        p.sub{color:var(--muted);font-size:.85rem;margin:.4rem 0 2rem;font-weight:500}
        .flash{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:.85rem;font-weight:600}
        .flash.danger{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
        .flash.success{background:#ecfdf5;border:1px solid #a7f3d0;color:#059669}
        .iw{position:relative;margin-bottom:1.2rem;text-align:left}
        .iw i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem}
        .iw input{width:100%;padding:13px 16px 13px 44px;background:#ffffff;border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:.92rem;font-family:inherit;transition:.2s;box-shadow:inset 0 1px 2px rgba(0,0,0,.02)}
        .iw input::placeholder{color:#94a3b8}
        .iw input:focus{outline:none;border-color:#6366f1;background:#ffffff;box-shadow:0 0 0 4px rgba(99,102,241,.2)}
        .btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:.25s;box-shadow:0 8px 25px rgba(99,102,241,.3)}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(99,102,241,.4)}
        .back{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:1.4rem;color:#475569;font-size:.85rem;text-decoration:none;transition:.2s;font-weight:600}
        .back:hover{color:var(--green)}
    </style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="card">
    <div class="icon"><i class="fas fa-shield-halved"></i></div>
    <h2>Đặt lại mật khẩu</h2>
    <p class="sub">Tạo mật khẩu mới cho <strong style="color:var(--text)">{{ email }}</strong></p>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat,msg in messages %}<div class="flash {{cat}}">{{msg}}</div>{% endfor %}{% endif %}
    {% endwith %}
    <form action="{{ url_for('auth.reset_password', email=email) }}" method="POST">
        <div class="iw"><i class="fas fa-lock"></i><input type="password" name="password" placeholder="Mật khẩu mới" required></div>
        <div class="iw"><i class="fas fa-lock-open"></i><input type="password" name="confirm_password" placeholder="Xác nhận mật khẩu" required></div>
        <button type="submit" class="btn"><i class="fas fa-check"></i> Xác nhận đổi mật khẩu</button>
    </form>
    <a href="{{ url_for('auth.index') }}" class="back"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
</div>
</body>
</html>
