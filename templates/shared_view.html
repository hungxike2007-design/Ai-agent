<!DOCTYPE html>
<html>
<head>
    <title>Báo cáo chia sẻ: {{ filename }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5 bg-white p-5 shadow-sm rounded">
        <h1 class="text-primary">Báo cáo phân tích dữ liệu AI</h1>
        <p class="text-muted">Tên file: <strong>{{ filename }}</strong> | Ngày tạo: {{ date }}</p>
        <hr>
        <div class="report-content" style="white-space: pre-wrap;">
            {{ content | safe }}
        </div>
        <hr class="mt-5">
        <h4>Dữ liệu phân tích (15 dòng đầu)</h4>
        <div class="table-responsive">
            {{ table_preview | safe }}
        </div>
    </div>
</body>
</html>
