<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu — AI Agent Analytics</title>
    <meta name="description" content="Tạo mật khẩu mới cho tài khoản AI Agent Analytics">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand: oklch(52% 0.17 168);
            --brand-dark: oklch(42% 0.16 168);
            --brand-glow: oklch(52% 0.17 168 / 0.25);
            --purple: oklch(52% 0.18 285);
            --purple-glow: oklch(52% 0.18 285 / 0.25);
            --bg: oklch(97% 0.006 168);
            --surface: oklch(100% 0.004 168 / 0.85);
            --border: oklch(100% 0.004 168 / 0.65);
            --border-subtle: oklch(88% 0.008 168);
            --text: oklch(14% 0.008 168);
            --muted: oklch(50% 0.012 168);
            --subtle: oklch(68% 0.010 168);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        #particle-canvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        .orb {
            position: fixed; border-radius: 50%;
            filter: blur(80px); pointer-events: none; z-index: 1;
        }
        .orb-1 { width: 500px; height: 500px; background: oklch(68% 0.16 285 / 0.14); top: -160px; left: -140px; animation: d1 16s ease-in-out infinite; }
        .orb-2 { width: 400px; height: 400px; background: oklch(60% 0.14 168 / 0.14); bottom: -100px; right: -100px; animation: d2 20s ease-in-out infinite; }
        @keyframes d1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(25px,-35px); } }
        @keyframes d2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-22px,28px); } }

        .auth-card {
            position: relative; z-index: 10;
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 3rem 2.8rem;
            width: 100%; max-width: 440px;
            box-shadow: 0 1px 2px oklch(14% 0.008 168 / 0.04),
                        0 8px 32px oklch(14% 0.008 168 / 0.08),
                        0 40px 80px oklch(14% 0.008 168 / 0.06);
            text-align: center;
            animation: cardIn 0.55s var(--ease-out-expo) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Shield animation */
        .shield-wrap {
            position: relative;
            width: 80px; height: 80px;
            margin: 0 auto 1.5rem;
        }
        .shield-wrap .rings {
            position: absolute; inset: -14px;
        }
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid transparent;
            animation: ringExpand 2.5s ease-out infinite;
        }
        .ring:nth-child(1) { inset: 0; border-color: var(--purple-glow); animation-delay: 0s; }
        .ring:nth-child(2) { inset: -8px; border-color: oklch(52% 0.18 285 / 0.15); animation-delay: 0.5s; }
        .ring:nth-child(3) { inset: -16px; border-color: oklch(52% 0.18 285 / 0.08); animation-delay: 1s; }
        @keyframes ringExpand {
            0% { opacity: 1; transform: scale(0.8); }
            100% { opacity: 0; transform: scale(1.4); }
        }
        .shield-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--purple), oklch(42% 0.18 285));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.9rem; color: #fff;
            box-shadow: 0 8px 28px var(--purple-glow);
            position: relative; z-index: 2;
        }

        h1 {
            font-size: 1.6rem; font-weight: 800;
            color: var(--text); letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: var(--muted); font-size: 0.9rem;
            font-weight: 500; margin-bottom: 2rem; line-height: 1.6;
        }
        .sub strong { color: var(--text); }

        .flash {
            padding: 12px 16px; border-radius: 12px;
            margin-bottom: 1rem; font-size: 0.875rem;
            font-weight: 600; display: flex;
            align-items: center; gap: 8px; text-align: left;
        }
        .flash.success { background: oklch(97% 0.04 155); border: 1px solid oklch(80% 0.10 155); color: oklch(35% 0.12 155); }
        .flash.danger  { background: oklch(97% 0.03 25);  border: 1px solid oklch(80% 0.10 25);  color: oklch(40% 0.14 25); }

        /* Password strength bar */
        .strength-bar {
            height: 4px; background: var(--border-subtle);
            border-radius: 4px; margin-top: 8px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%; border-radius: 4px;
            transition: width 0.3s, background 0.3s;
            width: 0%;
        }

        .input-wrap { position: relative; margin-bottom: 1.2rem; text-align: left; }
        .input-wrap .input-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--subtle); font-size: 0.875rem;
            pointer-events: none; z-index: 2;
        }
        .input-wrap input {
            width: 100%; padding: 13px 16px 13px 42px;
            background: oklch(100% 0.003 168 / 0.75);
            border: 1px solid var(--border-subtle);
            border-radius: 12px; color: var(--text);
            font-size: 0.9375rem; font-family: inherit;
            font-weight: 500; transition: all 0.2s var(--ease-out-quart);
        }
        .input-wrap input::placeholder { color: var(--subtle); font-weight: 400; }
        .input-wrap input:focus {
            outline: none; border-color: var(--purple);
            background: oklch(100% 0.004 168);
            box-shadow: 0 0 0 3px var(--purple-glow);
        }

        .btn-main {
            width: 100%; padding: 13px; border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--purple), oklch(42% 0.18 285));
            color: #fff; font-size: 0.9375rem; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: all 0.2s var(--ease-out-quart);
            box-shadow: 0 4px 16px var(--purple-glow);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--purple-glow); filter: brightness(1.05); }
        .btn-main:active { transform: translateY(0); }

        .back-link {
            display: inline-flex; align-items: center;
            gap: 6px; margin-top: 1.5rem;
            color: var(--muted); font-size: 0.875rem;
            font-weight: 600; text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--purple); }
    </style>
</head>

<body>
    <canvas id="particle-canvas"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="auth-card">
        <div class="shield-wrap">
            <div class="rings">
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
            </div>
            <div class="shield-icon"><i class="fas fa-shield-halved"></i></div>
        </div>

        <h1>Đặt lại mật khẩu</h1>
        <p class="sub">Tạo mật khẩu mới cho <strong>{{ email }}</strong></p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for cat, msg in messages %}
        <div class="flash {{ cat }}">
            <i class="fas fa-{% if cat == 'success' %}check-circle{% else %}exclamation-circle{% endif %}"></i>
            {{ msg }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.reset_password', email=email) }}" method="POST">
            <div class="input-wrap">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="new-password" name="password" placeholder="Mật khẩu mới" required oninput="checkStrength(this.value)">
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            </div>
            <div class="input-wrap">
                <i class="fas fa-lock-open input-icon"></i>
                <input type="password" name="confirm_password" placeholder="Xác nhận mật khẩu" required>
            </div>
            <button type="submit" class="btn-main">
                <i class="fas fa-check-circle"></i> Xác nhận đổi mật khẩu
            </button>
        </form>

        <a href="{{ url_for('auth.index') }}" class="back-link">
            <i class="fas fa-arrow-left"></i> Quay lại đăng nhập
        </a>
    </div>

    <script>
        function checkStrength(val) {
            const fill = document.getElementById('strength-fill');
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const widths  = ['0%', '25%', '50%', '75%', '100%'];
            const colors  = ['', 'oklch(52% 0.2 25)', 'oklch(55% 0.18 50)', 'oklch(55% 0.16 90)', 'oklch(52% 0.14 155)'];
            fill.style.width = widths[score];
            fill.style.background = colors[score] || 'transparent';
        }

        // ── Floating particles ──
        (function () {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let W, H, particles = [];
            const N = 40;

            function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

            function init() {
                particles = Array.from({ length: N }, () => ({
                    x: Math.random() * W, y: Math.random() * H,
                    r: Math.random() * 3 + 1,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    alpha: Math.random() * 0.2 + 0.05,
                    hue: 250 + Math.random() * 60,
                }));
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > W) p.vx *= -1;
                    if (p.y < 0 || p.y > H) p.vy *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `oklch(60% 0.15 ${p.hue} / ${p.alpha})`;
                    ctx.fill();
                });
                // Lines between nearby
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const d = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
                        if (d < 130) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `oklch(58% 0.14 270 / ${(1 - d / 130) * 0.12})`;
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', () => { resize(); init(); });
            resize(); init(); draw();
        })();
    </script>
</body>

</html>
