<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu — AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --green: #059669; --green-d: #047857; --green-glow: rgba(5,150,105,0.25); --bg: #f8fafc; --border: #e2e8f0; --text: #0f172a; --muted: #64748b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .bg-blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none; }
        .blob-1 { width: 400px; height: 400px; background: #10b981; top: -120px; left: -120px; }
        .blob-2 { width: 350px; height: 350px; background: #6366f1; bottom: -100px; right: -100px; }
        .card { position: relative; z-index: 10; background: rgba(255,255,255,0.9); backdrop-filter: blur(24px); border: 1px solid #ffffff; border-radius: 28px; padding: 2.8rem 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); text-align: center; animation: slideUp .5s ease; }
        @keyframes slideUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
        .icon-wrap { width: 64px; height: 64px; background: linear-gradient(135deg,var(--green),var(--green-d)); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.7rem; color: white; margin: 0 auto 1.2rem; box-shadow: 0 10px 30px var(--green-glow); }
        h2 { font-size: 1.4rem; font-weight: 800; color: var(--text); }
        p.sub { color: var(--muted); font-size: .85rem; margin-top: .4rem; margin-bottom: 2rem; font-weight: 500; }
        .flash { padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; font-size: .85rem; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; font-weight: 600; }
        .input-wrap { position: relative; margin-bottom: 1.2rem; text-align: left; }
        .input-wrap i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: .9rem; }
        .input-wrap input { width: 100%; padding: 13px 16px 13px 44px; background: #ffffff; border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: .92rem; font-family: inherit; transition: .2s; box-shadow: inset 0 1px 2px rgba(0,0,0,0.02); }
        .input-wrap input::placeholder { color: #94a3b8; }
        .input-wrap input:focus { outline: none; border-color: var(--green); background: #ffffff; box-shadow: 0 0 0 4px var(--green-glow); }
        .btn-main { width: 100%; padding: 13px; border: none; border-radius: 12px; background: linear-gradient(135deg,var(--green),var(--green-d)); color: white; font-size: .95rem; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 8px 25px var(--green-glow); transition: .25s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(5,150,105,0.3); }
        .back-link { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 1.4rem; color: #475569; font-size: .85rem; font-weight: 600; text-decoration: none; transition: .2s; }
        .back-link:hover { color: var(--green); }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="card">
        <div class="icon-wrap"><i class="fas fa-key"></i></div>
        <h2>Quên mật khẩu?</h2>
        <p class="sub">Nhập email đã đăng ký, chúng tôi sẽ giúp bạn đặt lại mật khẩu.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for cat, msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.forgot_password') }}" method="POST">
            <div class="input-wrap">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" placeholder="Email đã đăng ký" required>
            </div>
            <button type="submit" class="btn-main"><i class="fas fa-paper-plane"></i> Gửi yêu cầu</button>
        </form>
        <a href="{{ url_for('auth.index') }}" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
    </div>
</body>
</html>
