<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Hùng copy đoạn CSS :root và body (phần nền chuyển động) từ index.html dán vào đây */
        :root {
            --primary-grad: linear-gradient(135deg, #10a37f 0%, #0e8c6d 100%);
            --bg-animate: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-animate);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Copy phần .auth-container và các class liên quan từ index.html sang để nó đồng bộ */
        .auth-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo-icon { font-size: 3rem; color: #10a37f; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e5e7eb; box-sizing: border-box; }
        .btn-main { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            background: var(--primary-grad); color: white; font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-icon"><i class="fas fa-key"></i></div>
    <h2>Quên mật khẩu?</h2>
    <p>Nhập email của bạn để nhận mã OTP khôi phục</p>

    <form action="{{ url_for('auth.forgot_password') }}" method="POST">
        <div class="form-group">
            <input type="email" name="email" placeholder="Email đăng ký" required>
        </div>
        <button type="submit" class="btn-main">Gửi mã xác nhận</button>
    </form>
    
    <a href="{{ url_for('auth.index') }}" style="display:block; margin-top:15px; text-decoration:none; color:#6b7280; font-size: 0.9rem;">
        <i class="fas fa-arrow-left"></i> Quay lại đăng nhập
    </a>
</div>

</body>
</html>
